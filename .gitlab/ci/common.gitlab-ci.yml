# Shared CI templates for rmcp-openapi

# sccache configuration for build caching
.sccache-rust:
  variables:
    RUSTC_WRAPPER: "sccache"
    SCCACHE_LOG: "warn"
  before_script:
    - sccache --version || true

# Docker-in-Docker variables (reusable anchor)
.docker-in-docker-variables: &docker-in-docker-variables
  DOCKER_TLS_CERTDIR: "/certs"

# Docker-in-Docker template
.docker-in-docker:
  image: docker:29.3.1-dind@sha256:686d2c5464787b0ca42420e0aa03a94fc9781ff9bf8b5ff947614b9fa4c3c3e0
  tags:
    - docker-in-docker
  services:
    - docker:29.3.1-dind@sha256:686d2c5464787b0ca42420e0aa03a94fc9781ff9bf8b5ff947614b9fa4c3c3e0
  variables:
    <<: *docker-in-docker-variables
  before_script:
    - docker info
