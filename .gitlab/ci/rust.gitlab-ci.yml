# Common file patterns for Rust jobs
.rust-changes: &rust-changes
  - "Cargo.toml"
  - "Cargo.lock"
  - "crates/**/*"
  - "tests/**/*"
  - "examples/**/*"
  - ".cargo/**/*"
  - "container/Containerfile" # Watch the application Containerfile
  - ".gitlab/ci/rust.gitlab-ci.yml" # Watch the Rust CI config file

# Cache configuration patterns for optimal build performance
.cargo-registry-cache: &cargo-registry-cache
  key: $CI_COMMIT_REF_SLUG
  paths:
    # https://doc.rust-lang.org/cargo/guide/cargo-home.html?highlight=CI%20cache#caching-the-cargo-home-in-ci
    - ".cargo/.crates.toml"
    - ".cargo/.crates2.json"
    - ".cargo/bin/"
    - ".cargo/registry/index/"
    - ".cargo/registry/cache/"
    - ".cargo/registry/src/"
    - ".cargo/git/db/"
  policy: pull

# Use release-lto profile for tagged releases and main branch
.cargo-profile-release-lto-rule: &cargo-profile-release-lto-rule
  if: "$CI_COMMIT_TAG"
  variables:
    CARGO_PROFILE: "release-lto"

# Manual force-build/push of the rmcp-openapi-server container image.
# Used by build:x86_64-unknown-linux-gnu (so the binary the container needs
# is produced) and package:container-image.
.image-force-rmcp-openapi-server-rule: &image-force-rmcp-openapi-server-rule
  if: '$IMAGE_BUILD_FORCE == "all" || $IMAGE_BUILD_FORCE == "rmcp-openapi-server" || $IMAGE_PUSH_FORCE == "all" || $IMAGE_PUSH_FORCE == "rmcp-openapi-server"'

# Unified Rust job template - consolidated configuration for all Rust jobs
.rust-template:
  image: registry.gitlab.com/lx-industries/rmcp-openapi/images/rust:1.96.0-x86_64-unknown-linux-gnu@sha256:c9a60f997973ed7d10946b504a36add57cf106f05c1b3ff3432d993d54bdf2d8
  variables:
    # Assume the PWD is CI_PROJECT_DIR, this way we don't have to deal with
    # Windows (`\`) vs Linux (`/`) path separators.
    CARGO_HOME: ".cargo"
  rules:
    - *cargo-profile-release-lto-rule
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes: *rust-changes
    - if: "$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH"
      changes: *rust-changes
  before_script:
    - rustc --version
    - cargo --version
  interruptible: true

# Build job - compile the project
build:x86_64-unknown-linux-gnu:
  extends:
    - .rust-template
    - .sccache-rust
  stage: build
  rules:
    - *image-force-rmcp-openapi-server-rule
    - *cargo-profile-release-lto-rule
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes: *rust-changes
    - if: "$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH"
  before_script:
    - !reference [.sccache-rust, before_script]
    - !reference [.rust-template, before_script]
  script:
    - cargo build --target x86_64-unknown-linux-gnu --workspace --all-features --verbose --profile $CARGO_PROFILE
    - sccache --show-stats || true
  cache:
    - <<: *cargo-registry-cache
  artifacts:
    when: on_success
    expire_in: 1 week
    paths:
      - target/x86_64-unknown-linux-gnu/$CARGO_PROFILE/rmcp-openapi-server

# Windows cross-compilation build job
build:x86_64-pc-windows-msvc:
  image: registry.gitlab.com/lx-industries/rmcp-openapi/images/rust:1.96.0-x86_64-pc-windows-msvc@sha256:d61cb511f95d33ae207ea55b838e57614f8f68c067586db181e6563625535fb7
  extends:
    - .sccache-rust
  stage: build
  variables:
    CARGO_HOME: ".cargo"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes: *rust-changes
    - if: "$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH"
      changes: *rust-changes
  before_script:
    - !reference [.sccache-rust, before_script]
    - rustc --version
    - cargo --version
  script:
    - cargo xwin build --workspace --all-features --verbose --profile $CARGO_PROFILE
    - sccache --show-stats || true
  cache:
    - <<: *cargo-registry-cache
  artifacts:
    when: on_success
    expire_in: 1 week
    paths:
      - target/x86_64-pc-windows-msvc/$CARGO_PROFILE/rmcp-openapi-server.exe
  interruptible: true

# Test job - run unit tests only (excluding integration tests)
test:
  extends:
    - .rust-template
    - .sccache-rust
  stage: test
  before_script:
    - !reference [.sccache-rust, before_script]
    - !reference [.rust-template, before_script]
  script:
    - cargo test --workspace --verbose --lib --bins --profile $CARGO_PROFILE
    - sccache --show-stats || true
  cache:
    - <<: *cargo-registry-cache
      policy: pull
  dependencies:
    - build:x86_64-unknown-linux-gnu

# Clippy job - run linting
clippy:
  extends:
    - .rust-template
    - .sccache-rust
  stage: lint
  before_script:
    - !reference [.sccache-rust, before_script]
    - !reference [.rust-template, before_script]
    - rustup component add clippy
    - cargo clippy --version
  script:
    - cargo clippy --workspace --all-targets --all-features --profile $CARGO_PROFILE -- -D warnings
    - sccache --show-stats || true
  cache:
    - <<: *cargo-registry-cache
      policy: pull
  dependencies:
    - build:x86_64-unknown-linux-gnu

# Format job - check code formatting
fmt:
  extends: .rust-template
  stage: lint
  before_script:
    - !reference [.rust-template, before_script]
    - rustup component add rustfmt
    - cargo fmt --version
  script:
    - cargo fmt --all -- --check
  cache:
    - <<: *cargo-registry-cache

# Typos job - check for spelling errors
typos:
  extends: .rust-template
  stage: lint
  needs: []
  before_script:
    - typos --version
  script:
    - typos

# Documentation job - build and check rustdoc
rustdoc:
  extends:
    - .rust-template
    - .sccache-rust
  stage: docs
  before_script:
    - !reference [.sccache-rust, before_script]
    - !reference [.rust-template, before_script]
  script:
    # Build documentation with all features and check for warnings
    - cargo doc --workspace --all-features --no-deps --profile $CARGO_PROFILE 2>&1 | tee doc-output.txt
    - '! grep -E "warning.*missing documentation" doc-output.txt || (echo "Missing documentation found!" && exit 1)'
    # Also build with private items to ensure internal documentation is complete
    - cargo rustdoc --package rmcp-openapi --lib --profile $CARGO_PROFILE -- --document-private-items
    - sccache --show-stats || true
  cache:
    - <<: *cargo-registry-cache
      policy: pull
  dependencies:
    - build:x86_64-unknown-linux-gnu
  artifacts:
    paths:
      - target/doc
      - doc-output.txt
    expire_in: 1 week
    when: always

# Documentation examples job - ensure all documentation examples compile
doc-test:
  extends:
    - .rust-template
    - .sccache-rust
  stage: docs
  before_script:
    - !reference [.sccache-rust, before_script]
    - !reference [.rust-template, before_script]
  script:
    # Run documentation tests to ensure examples compile
    - cargo test --workspace --doc --all-features --profile $CARGO_PROFILE
    - sccache --show-stats || true
  cache:
    - <<: *cargo-registry-cache
      policy: pull
  dependencies:
    - build:x86_64-unknown-linux-gnu

# Examples job - build all examples
examples:
  extends:
    - .rust-template
    - .sccache-rust
  stage: examples
  before_script:
    - !reference [.sccache-rust, before_script]
    - !reference [.rust-template, before_script]
  script:
    - cargo build --workspace --examples --verbose --profile $CARGO_PROFILE
    - sccache --show-stats || true
  cache:
    - <<: *cargo-registry-cache
      policy: pull
  dependencies:
    - build:x86_64-unknown-linux-gnu

# Container image - build and save tar artifact
package:container-image:
  extends: .docker-in-docker
  stage: package
  needs:
    - job: build:x86_64-unknown-linux-gnu
    - job: test
      optional: true
      artifacts: false
    - job: clippy
      optional: true
      artifacts: false
    - job: fmt
      optional: true
      artifacts: false
    - job: typos
      optional: true
      artifacts: false
    - job: rustdoc
      optional: true
      artifacts: false
    - job: doc-test
      optional: true
      artifacts: false
    - job: examples
      optional: true
      artifacts: false
    - job: integration-js
      optional: true
      artifacts: false
    - job: build:x86_64-pc-windows-msvc
      optional: true
      artifacts: false
    - job: semantic-release-lint
      optional: true
      artifacts: false
  variables:
    CARGO_TARGET: "x86_64-unknown-linux-gnu"
    CARGO_TARGET_BIN_DIR: "target/${CARGO_TARGET}/${CARGO_PROFILE}"
  rules:
    - *image-force-rmcp-openapi-server-rule
    - *cargo-profile-release-lto-rule
    - if: "$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH"
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes: *rust-changes
  artifacts:
    when: on_success
    expire_in: "2 hours"
    paths:
      - "image.tar"
  script:
    - docker login -u gitlab-ci-token -p $CI_JOB_TOKEN $CI_REGISTRY
    - docker build -t ${LOCAL_CONTAINER_IMAGE} -f ./container/Containerfile $CARGO_TARGET_BIN_DIR
    - docker save ${LOCAL_CONTAINER_IMAGE} -o image.tar

# Container image - load and push to registry
push:container-image:
  extends: .docker-in-docker
  stage: release
  interruptible: false
  needs:
    - package:container-image
  rules:
    - if: '$IMAGE_PUSH_FORCE == "all" || $IMAGE_PUSH_FORCE == "rmcp-openapi-server"'
    - if: "$CI_COMMIT_TAG"
    - if: "$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH"
  script:
    - docker load -i image.tar
    # Strip 'v' prefix from tag for OCI-compliant semver tags (v0.26.6 -> 0.26.6)
    - IMAGE_TAG="${CI_COMMIT_REF_NAME#v}"
    - CONTAINER_IMAGE="${CI_REGISTRY_IMAGE}/images/rmcp-openapi-server:${IMAGE_TAG}"
    - docker tag ${LOCAL_CONTAINER_IMAGE} ${CONTAINER_IMAGE}
    - docker login -u gitlab-ci-token -p ${CI_JOB_TOKEN} ${CI_REGISTRY}
    - docker push ${CONTAINER_IMAGE}

# Integration test with JavaScript/Node.js
integration-js:
  extends:
    - .rust-template
    - .sccache-rust
  stage: integration
  before_script:
    - !reference [.sccache-rust, before_script]
    - !reference [.rust-template, before_script]
    - apt-get update -qq && apt-get install -y -qq curl
    - curl -fsSL https://nodejs.org/dist/v20.11.1/node-v20.11.1-linux-x64.tar.xz | tar -xJ -C /usr/local --strip-components=1
    - node --version
    - npm --version
  script:
    - cargo test --package rmcp-openapi --test test_with_js --verbose --profile $CARGO_PROFILE
    - sccache --show-stats || true
  cache:
    - <<: *cargo-registry-cache
      policy: pull
  dependencies:
    - build:x86_64-unknown-linux-gnu
  interruptible: true
